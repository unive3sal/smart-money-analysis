version: '3.8'

services:
  smart-money-analysis:
    build:
      context: .
      dockerfile: Dockerfile
    image: smart-money-analysis:latest
    container_name: smart-money-analysis
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - CCXT_EXCHANGE_ID=${CCXT_EXCHANGE_ID:-binance}
      - CCXT_DEFAULT_QUOTE=${CCXT_DEFAULT_QUOTE:-USDT}
      - LLM_PROXY_URL=${LLM_PROXY_URL:-http://localhost:3000/api/chat}
      - LLM_PROXY_TOKEN=${LLM_PROXY_TOKEN}
      - TIMESNET_SERVICE_URL=${TIMESNET_SERVICE_URL:-http://host.docker.internal:8000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
